<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>My test page</title>
  </head>
  <body>
    <p>This is my page</p>
    <form action="">
        <h1>Payment Form
            <p>Please complete all required (*) fields</p>
        </h1>
        <section>
            <h2>Contact Information</h2>
            <fieldset>
                <legend>Title</legend>
                <ul>
                    <li>
                        <label for="title_1">
                            <input type="radio" id="title_1" name="title" value="A">
                            Ace
                        </label>
                    </li>
                    <li>
                        <label for="title_2">
                            <input type="radio" id="title_2" name="title" value="K">
                            King
                        </label>
                    </li>
                    <li>
                        <label for="title_3">
                            <input type="radio" id="title_3" name="title" value="Q">
                        Queen
                        </label>
                    </li>
                </ul>
            </fieldset>
            <p>
                <label for="name">Name *:</label>
                <input type="text" id="name" name="name" required>
            </p>
            <p>
                <label for="email">email *:</label>
                <input type="text" id="email" name="email" required>
            </p>
            <p>
                <label for="pwd">Password *:</label>
                <input type="text" id="pwd" name="password" required>
            </p>
        </section>
        <section>
            <h2>Payment Information</h2>
                <p>
                    <label for="card">
                        <span>Card Type:</span>
                        <select name="carType" id="card">
                            <option value="visa">Visa</option>
                            <option value="mc">Master Card</option>
                            <option value="amex">American Express</option>
                        </select>
                    </label>
                </p>
                <p>
                    <label for="number">Card Number *:</label>
                    <input type="tel" id="number" name="cardNumber" required>
                </p>
                <p>
                    <label for="expiration">Expiration Date *:</label>
                    <input type="text" id="expiration" name="expirationDate" required 
                    placeholder="MM/YY" pattern="^(0[1-9]|1[0-2])\/([0-9]{2})$">
                </p>
        </section>
        <section>
            <p><button type="submit">Validate Payment</button></p>
        </section>
    </form>
  </body>
</html>
